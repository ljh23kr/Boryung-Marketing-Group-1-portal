<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>무엇이든 물어보령</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(0,163,224,.18) 0%,transparent 60%),radial-gradient(ellipse 60% 80% at 85% 90%,rgba(0,87,168,.22) 0%,transparent 55%),linear-gradient(160deg,#002060 0%,#003087 45%,#0057B8 100%);padding:24px 16px}
.wrap{width:100%;max-width:400px;animation:up .5s cubic-bezier(.22,.68,0,1.18) both}
@keyframes up{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:none}}
.top-text{text-align:center;margin-bottom:28px}
.main-title{font-size:22px;font-weight:900;color:#fff;line-height:1.45;text-shadow:0 2px 16px rgba(0,0,0,.3)}
.main-title span{color:#7DD3FC}
.sub-title{font-size:13px;font-weight:600;color:rgba(255,255,255,.65);margin-top:6px}
.card{background:rgba(255,255,255,.97);border-radius:18px;padding:32px 28px 24px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.card-title{font-size:17px;font-weight:800;color:#003087;margin-bottom:4px}
.card-desc{font-size:12.5px;color:#94A3B8;margin-bottom:26px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:700;color:#475569;margin-bottom:6px}
.field input{width:100%;padding:11px 14px;border:1.5px solid #E2E8F0;border-radius:9px;font-size:14px;outline:none;background:#F8FAFC;transition:border-color .2s}
.field input:focus{border-color:#00A3E0;background:#fff}
.err{display:none;background:#FEE2E2;color:#B91C1C;font-size:12px;padding:9px 12px;border-radius:8px;margin-bottom:14px;text-align:center}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,#003087,#00A3E0);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s;margin-bottom:14px}
.btn:hover{opacity:.88}
.btn:disabled{opacity:.5;cursor:not-allowed}
.note{text-align:center;font-size:11.5px;color:#94A3B8;margin-bottom:10px}
.card-bottom{display:flex;flex-direction:column;align-items:center;gap:12px}
.admin-btn{font-size:12px;font-weight:600;color:#94A3B8;background:none;border:1px solid #E2E8F0;border-radius:7px;padding:7px 18px;cursor:pointer;transition:all .15s}
.admin-btn:hover{color:#003087;border-color:#003087;background:#F0F6FF}
.ci-logo{width:140px;height:auto;display:block}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:18px;padding:28px 24px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.3);max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:800;color:#003087;margin-bottom:4px}
.modal-desc{font-size:12px;color:#94A3B8;margin-bottom:20px}
.msec{margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid #F1F5F9}
.msec:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.msec-title{font-size:13px;font-weight:800;color:#1E293B;margin-bottom:12px}
.st{font-size:12px;margin-top:8px;min-height:18px}
.st-ok{color:#065F46}.st-err{color:#991B1B}
.mbtn{display:flex;gap:8px;margin-top:16px}
.btn-cancel{flex:1;padding:11px;border:1.5px solid #E2E8F0;background:#fff;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;color:#475569}
.btn-s{padding:9px 18px;background:linear-gradient(135deg,#003087,#00A3E0);color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer}
.btn-s:disabled{opacity:.5;cursor:not-allowed}
.log-wrap{overflow-x:auto;margin-top:8px}
.log-table{width:100%;border-collapse:collapse;font-size:12px;min-width:300px}
.log-table th{background:#F1F5F9;padding:7px 10px;text-align:left;font-weight:700;color:#475569;border-bottom:2px solid #E2E8F0;white-space:nowrap}
.log-table td{padding:7px 10px;border-bottom:1px solid #F1F5F9;color:#1E293B;vertical-align:top}
.log-empty{text-align:center;color:#94A3B8;padding:20px;font-size:12.5px}
</style>
</head>
<body>
<div class="wrap">
  <div class="top-text">
    <div class="main-title">고혈압, 당뇨병, 이상지질혈증<br/><span>무엇이든 물어보령~</span></div>
    <div class="sub-title">마케팅 1그룹 영업 전용 포털</div>
  </div>
  <div class="card">
    <div class="card-title">로그인</div>
    <div class="card-desc">사번과 비밀번호를 입력하면 챗봇으로 바로 이동합니다.</div>
    <div id="err" class="err"></div>
    <div class="field">
      <label>사번</label>
      <input id="empid" type="text" placeholder="사번 입력" inputmode="numeric" autocomplete="off"
        onkeydown="if(event.key==='Enter')document.getElementById('pw').focus()"/>
    </div>
    <div class="field" style="margin-bottom:20px">
      <label>비밀번호</label>
      <input id="pw" type="password" placeholder="비밀번호 입력" maxlength="30"
        onkeydown="if(event.key==='Enter')login()"/>
    </div>
    <button class="btn" id="login-btn" onclick="login()">로그인 → 챗봇 접속</button>
    <p class="note">문의: CVM2팀 이정훈</p>

<script>
// ★ Script URL 고정 — 모든 사용자가 동일한 서버에서 비밀번호 확인
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxCXBi0y4IrrEkc5NPJyerFUiOZ4mdfYcnref4eXt3g9_6Md5h8q0WxjUZ2d39iP3wAsQ/exec';
const NB = 'https://notebooklm.google.com/notebook/4fa1e039-81aa-495d-8257-fa06a16b5dda?authuser=1';
const ADMIN_PW = 'admin1234';
let _auth = false;

async function gsFetch(params) {
  try {
    const res = await fetch(SCRIPT_URL + '?' + new URLSearchParams(params));
    return await res.json();
  } catch(e) { return {ok:false, error:e.message}; }
}

// 로그인: 항상 서버에서 비밀번호 확인
async function login() {
  const emp = document.getElementById('empid').value.trim();
  const pw  = document.getElementById('pw').value;
  const err = document.getElementById('err');
  const btn = document.getElementById('login-btn');
  if(!emp) { showErr(err,'사번을 입력해 주세요.'); return; }
  if(!pw)  { showErr(err,'비밀번호를 입력해 주세요.'); return; }
  btn.disabled=true; btn.textContent='확인 중...';
  const r = await gsFetch({action:'login', empid:emp, pw:pw});
  if(r.ok) {
    window.location.href = NB;
  } else {
    showErr(err, r.error||'비밀번호가 올바르지 않습니다.');
    btn.disabled=false; btn.textContent='로그인 → 챗봇 접속';
  }
}

function showErr(el,msg) {
  el.textContent=msg; el.style.display='block';
  el.style.animation='none'; void el.offsetWidth; el.style.animation='shake .35s ease';
}

function openAdmin() {
  _auth=false;
  document.getElementById('auth-st').textContent='';
  document.getElementById('pw-sec').style.display='none';
  document.getElementById('log-sec').style.display='none';
  document.getElementById('adm-pw').value='';
  document.getElementById('admin-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('adm-pw').focus(),200);
}
function closeAdmin() { document.getElementById('admin-overlay').classList.remove('open'); }

function verifyAdmin() {
  const pw=document.getElementById('adm-pw').value;
  const st=document.getElementById('auth-st');
  if(pw!==ADMIN_PW) { st.textContent='❌ 관리자 비밀번호가 올바르지 않습니다.'; st.className='st st-err'; return; }
  _auth=true;
  st.textContent='✓ 인증됐습니다.'; st.className='st st-ok';
  document.getElementById('pw-sec').style.display='block';
  document.getElementById('log-sec').style.display='block';
}

async function changePw() {
  if(!_auth) return;
  const p1=document.getElementById('new-pw1').value;
  const p2=document.getElementById('new-pw2').value;
  const st=document.getElementById('pw-st');
  const btn=document.getElementById('pw-btn');
  if(!p1) { st.textContent='새 비밀번호를 입력해 주세요.'; st.className='st st-err'; return; }
  if(p1!==p2) { st.textContent='비밀번호가 일치하지 않습니다.'; st.className='st st-err'; return; }
  btn.disabled=true; btn.textContent='저장 중...';
  st.textContent='서버에 저장 중...'; st.className='st';
  const r = await gsFetch({action:'setPw', pw:p1});
  if(r.ok) {
    st.textContent='✓ 저장 완료! 모든 담당자에게 즉시 적용됩니다.'; st.className='st st-ok';
    document.getElementById('new-pw1').value='';
    document.getElementById('new-pw2').value='';
  } else {
    st.textContent='❌ '+(r.error||'저장 실패'); st.className='st st-err';
  }
  btn.disabled=false; btn.textContent='모든 담당자에게 적용';
}

async function loadLogs() {
  const cont=document.getElementById('log-container');
  const btn=document.getElementById('log-btn');
  btn.disabled=true; btn.textContent='불러오는 중...';
  cont.innerHTML='<div class="log-empty">불러오는 중...</div>';
  const r = await gsFetch({action:'getLogs'});
  if(!r.ok) { cont.innerHTML=`<div class="log-empty">❌ ${r.error||'오류'}</div>`; btn.disabled=false; btn.textContent='🔄 로그 불러오기'; return; }
  const rows=r.logs||[];
  if(!rows.length) { cont.innerHTML='<div class="log-empty">접속 기록이 없습니다.</div>'; btn.disabled=false; btn.textContent='🔄 로그 불러오기'; return; }
  let html='<table class="log-table"><thead><tr><th>시각</th><th>사번</th><th>결과</th></tr></thead><tbody>';
  rows.forEach(row=>{ html+=`<tr><td>${row[0]||''}</td><td>${row[1]||''}</td><td>${row[2]||''}</td></tr>`; });
  cont.innerHTML=html+'</tbody></table>';
  btn.disabled=false; btn.textContent='🔄 로그 불러오기';
}
</script>
</body>
</html>
